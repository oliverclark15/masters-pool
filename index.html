<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters Pool 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #f0ebe0;
            color: #2c2c2c;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a5c38 0%, #0f3d25 100%);
            color: white;
            padding: 28px 20px 20px;
            text-align: center;
            border-bottom: 5px solid #c9a84c;
        }

        header h1 {
            font-size: 2.2em;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        header .subtitle {
            color: #c9a84c;
            font-size: 0.75em;
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-bar {
            background: #0f3d25;
            color: #a8d5b8;
            text-align: center;
            padding: 9px 16px;
            font-size: 0.82em;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            flex-shrink: 0;
        }

        .dot.refreshing { animation: pulse 0.8s infinite; }
        .dot.error { background: #e74c3c; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
            display: grid;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card-header {
            background: #1a5c38;
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .round-badge {
            background: #c9a84c;
            color: #1a3020;
            font-size: 0.75em;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: #f5efe0;
            color: #5a4020;
            padding: 9px 14px;
            text-align: left;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 2px solid #ddd;
        }

        td {
            padding: 11px 14px;
            border-bottom: 1px solid #f0ebe0;
            font-size: 0.88em;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #faf6ed; }

        .rank-cell {
            font-weight: bold;
            font-size: 1.05em;
            width: 50px;
            color: #1a5c38;
        }

        .under { color: #c0392b; font-weight: bold; }
        .over  { color: #2c3e50; }
        .even  { color: #27ae60; font-weight: bold; }
        .grayed { color: #aaa; }

        .total-score {
            font-size: 1.3em;
            font-weight: bold;
        }

        .picks-cell { line-height: 2; }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 20px;
            padding: 2px 11px;
            margin: 2px 3px 2px 0;
            font-size: 0.78em;
            white-space: nowrap;
        }

        .tag.cut-tag {
            background: #f5f5f5;
            border-color: #ddd;
            color: #999;
        }

        .tag .tag-score { font-weight: bold; }

        .first-row td  { background: #fffbf0; }
        .second-row td { background: #f9f9f9; }

        /* Leaderboard */
        .lb-pos   { width: 50px; font-weight: bold; color: #555; }
        .lb-name  { font-weight: 500; }
        .lb-name.pool-pick { color: #1a5c38; font-weight: bold; }
        .lb-score { width: 70px; font-size: 1.05em; }
        .lb-round { width: 50px; text-align: center; color: #555; }
        .lb-thru  { width: 60px; color: #777; font-size: 0.85em; }

        .cut-divider td {
            background: #f0e8d0;
            color: #7a6030;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 14px;
            font-style: italic;
        }

        .pool-highlight td { background: #fffde7 !important; }

        /* Picker tooltip */
        .lb-name { position: relative; cursor: default; }

        .picker-tooltip {
            display: none;
            position: fixed;
            background: #1a3020;
            color: #e8f5e9;
            border: 1px solid #c9a84c;
            border-radius: 7px;
            padding: 9px 13px;
            font-size: 0.82em;
            font-family: sans-serif;
            white-space: normal;
            max-width: 260px;
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            line-height: 1.6;
        }

        .picker-tooltip .tt-title {
            color: #c9a84c;
            font-weight: bold;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .picker-tooltip .tt-names {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .picker-tooltip .tt-name {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 1px 7px;
            font-size: 0.95em;
        }

        .picker-tooltip .tt-none {
            color: #888;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
            font-family: sans-serif;
            font-size: 0.9em;
        }

        /* Holes left cell */
        .holes-left-cell { font-family: sans-serif; font-size: 0.85em; width: 80px; }
        .hl-many  { color: #aaa; }
        .hl-mid   { color: #e07b39; font-weight: bold; }
        .hl-few   { color: #c0392b; font-weight: bold; }
        .hl-done  { color: #27ae60; font-style: italic; }

        /* Popularity bars */
        .pop-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85em; }
        .pop-name { width: 160px; text-align: right; flex-shrink: 0; color: #2c2c2c; }
        .pop-bar-wrap { flex: 1; background: #f0ebe0; border-radius: 4px; height: 22px; position: relative; }
        .pop-bar { height: 100%; border-radius: 4px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 8px; }
        .pop-count { font-size: 0.8em; color: white; font-weight: bold; white-space: nowrap; }
        .pop-score { width: 50px; flex-shrink: 0; font-weight: bold; font-size: 0.88em; }

        /* Dark mode toggle button */
        .dark-toggle {
            position: absolute;
            top: 16px; right: 16px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 0.8em;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .dark-toggle:hover { background: rgba(255,255,255,0.22); }

        /* Dark mode overrides */
        body.dark { background: #111815; color: #dde8dd; }
        body.dark .card { background: #1a2118; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        body.dark th { background: #162014; color: #8ab89a; border-bottom-color: #2a3a2a; }
        body.dark td { border-bottom-color: #222e22; }
        body.dark tbody tr:hover td { background: #1e2a1e; }
        body.dark .first-row td  { background: #1c2c18; }
        body.dark .second-row td { background: #182018; }
        body.dark .pool-highlight td { background: #26280e !important; }
        body.dark .cut-divider td { background: #181e10; color: #8a8060; }
        body.dark .tag { background: #162814; border-color: #2a5030; }
        body.dark .tag.cut-tag { background: #222; border-color: #333; color: #777; }
        body.dark .pop-name { color: #b0c8b0; }
        body.dark .pop-bar-wrap { background: #222e22; }
        body.dark .empty-state { color: #556655; }
        body.dark .lb-pos   { color: #778877; }
        body.dark .lb-round { color: #778877; }
        body.dark .lb-thru  { color: #99aa99; }
        body.dark .lb-name  { color: #dde8dd; }
        body.dark .lb-name.pool-pick { color: #6dba8a; font-weight: bold; }
        body.dark .rank-cell { color: #6dba8a; }
        body.dark .grayed { color: #556655; }
        body.dark .hl-many { color: #556655; }
        body.dark .total-score.even { color: #6dba8a; }

        /* Projected cut line */
        .cut-line-row td {
            background: #fff0f0;
            color: #a03020;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 14px;
            font-style: italic;
            border-top: 1px dashed #e0a090;
        }
        body.dark .cut-line-row td {
            background: #2a1010;
            color: #cc7060;
            border-top-color: #5a2020;
        }

        /* Score ticker */
        @keyframes scoreIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .score-animate { animation: scoreIn 0.4s ease both; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5em; }
            th.r3, td.r3, th.r4, td.r4 { display: none; }
            .picks-cell .tag { font-size: 0.72em; }
        }
    </style>
</head>
<body>

<header style="position:relative;">
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">🌙 Dark</button>
    <h1>⛳ Masters Pool 2026</h1>
    <div class="subtitle">The World's Only International Cross-Border Masters Pool</div>
</header>

<div class="picker-tooltip" id="pickerTooltip"></div>

<div class="status-bar">
    <span class="dot" id="dot"></span>
    <span id="statusText">Loading live scores…</span>
</div>

<div class="container">

    <div class="card">
        <div class="card-header">Pool Standings</div>
        <div id="poolStandings"><div class="empty-state">Fetching scores…</div></div>
    </div>

    <div class="card">
        <div class="card-header">
            Masters Leaderboard
            <span class="round-badge" id="roundBadge">Live</span>
        </div>
        <div id="leaderboard"><div class="empty-state">Fetching scores…</div></div>
    </div>

    <div class="card">
        <div class="card-header">Who Picked Whom</div>
        <div id="picksMatrix" style="overflow-x:auto; padding: 0 0 8px;"></div>
    </div>

    <div class="card">
        <div class="card-header">Golfer Popularity</div>
        <div id="popularityChart" style="padding: 20px 24px;"></div>
    </div>

    <div class="card">
        <div class="card-header">Pool Standings · Bubble View</div>
        <div id="bubbleChart" style="overflow-x:auto; padding: 16px 24px;"></div>
    </div>

</div>

<script>
// ============================================================
//  POOL PICKS — edit this to set each member's four golfers.
//  Names must match the ESPN leaderboard spelling exactly.
// ============================================================
const POOL_MEMBERS = [
    { name: "Tano",          paid: true,  picks: [] },
    { name: "Heingartner",   paid: false, picks: [] },
    { name: "Oli",           paid: true,  picks: [] },
    { name: "Marshall",      paid: false, picks: [] },
    { name: "Robbie",        paid: true,  picks: [] },
    { name: "Lohan",         paid: true,  picks: ["Justin Rose", "Rory McIlroy", "Scottie Scheffler", "Tommy Fleetwood"] },
    { name: "Jordan Vann",   paid: true,  picks: [] },
    { name: "Tom Bebbington",paid: false, picks: [] },
    { name: "Topher",        paid: false, picks: [] },
    { name: "Gordan Hayward",paid: true,  picks: [] },
    { name: "Van Tuyle",     paid: true,  picks: [] },
    { name: "Smilestone",    paid: true,  picks: ["Ludvig Åberg", "Scottie Scheffler", "Tommy Fleetwood", "Xander Schauffele"] },
    { name: "Mano",          paid: true,  picks: ["Scottie Scheffler", "Jon Rahm", "Xander Schauffele", "Tommy Fleetwood"] },
    { name: "Bokla",         paid: true,  picks: [] },
    { name: "Macdougall",    paid: true,  picks: [] },
    { name: "Ish",           paid: false, picks: [] },
    { name: "Marty",         paid: false, picks: ["Ludvig Åberg", "Patrick Reed", "Rory McIlroy", "Scottie Scheffler"] },
    { name: "Karlson",       paid: true,  picks: [] },
    { name: "Scooter",       paid: true,  picks: [] },
    { name: "Jon Bebbington",paid: false, picks: [] },
    { name: "Pheeny",        paid: true,  picks: [] },
    { name: "Chapman",       paid: false, picks: [] },
    { name: "Daniela",       paid: false, picks: [] },
    { name: "Peters",        paid: true,  picks: [] },
    { name: "Freeman",       paid: true,  picks: [] },
    { name: "Josh Vann",     paid: true,  picks: [] },
];
// ============================================================

let golfersData    = {};
let tournamentName = "Masters Tournament";
let roundStatus    = "";
const REFRESH_MS   = 90_000;

// ── Fetch ────────────────────────────────────────────────────
async function fetchScores() {
    setDot('refreshing');
    setStatus('Refreshing scores…');
    try {
        const res = await fetch(
            'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga',
            { cache: 'no-store' }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        parseData(json);
        const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        setStatus(`Live · ${tournamentName} · ${roundStatus} · Updated ${t}`);
        setDot('ok');
        renderAll();
    } catch (err) {
        setDot('error');
        setStatus(`Error: ${err.message} — retrying in 90s`);
        document.getElementById('leaderboard').innerHTML =
            `<div class="empty-state" style="color:#e74c3c">Could not load scores.<br><small>${err.message}</small></div>`;
    }
}

function parseData(json) {
    golfersData = {};
    if (!json.events?.length) throw new Error('No event data');

    const event = json.events.find(e =>
        /masters/i.test(e.name || '') || /masters/i.test(e.shortName || '')
    ) || json.events[0];

    tournamentName = event.name || 'Masters Tournament';
    const comp = event.competitions?.[0];
    if (!comp) return;

    roundStatus = comp.status?.type?.shortDetail
               || comp.status?.type?.description
               || '';

    document.getElementById('roundBadge').textContent = roundStatus || 'Live';

    for (const c of (comp.competitors || [])) {
        const name = c.athlete?.displayName || c.displayName || '?';
        const stat = (c.status?.type?.name || '').toLowerCase();
        const status = stat.includes('cut') ? 'cut'
                     : stat.includes('wd') || stat.includes('withdraw') ? 'wd'
                     : stat.includes('dq') ? 'dq' : 'active';

        // Per-round to-par scores live in linescores[n].displayValue
        const rounds = {};
        let total = 0;
        (c.linescores || []).forEach((ls, i) => {
            const v = ls.displayValue;
            if (v && v !== '-' && v !== '--') {
                const n = parseScore(v);
                rounds[i + 1] = n;
                total += n;
            }
        });

        // Position from status.position, fall back to sortOrder for stable sort
        const position = c.status?.position?.displayName || '--';
        const sortOrder = parseInt(c.status?.position?.id || '999', 10) || 999;

        golfersData[name] = {
            name, score: total,
            scoreDisplay: fmt(total),
            status, position, sortOrder,
            thru: String(c.status?.displayThru ?? c.status?.thru ?? ''),
            rounds,
        };
    }
}

// ── Render pool standings ────────────────────────────────────
function renderPool() {
    const standings = POOL_MEMBERS.map(m => {
        const results   = m.picks.map(p => ({ name: p, data: find(p) }));
        const total     = results.reduce((s, g) => s + (g.data?.score ?? 0), 0);
        const holesLeft = results.reduce((s, g) => s + holesRemaining(g.data), 0);
        return { ...m, results, total, holesLeft };
    }).sort((a, b) => a.total - b.total);

    let html = `<table><thead><tr>
        <th>Rank</th><th>Member</th><th>Picks</th><th>Total</th><th title="Holes remaining across all 4 golfers (max 288)">Holes Left</th>
    </tr></thead><tbody>`;

    standings.forEach((m, i) => {
        const rowCls = i === 0 ? 'first-row' : i === 1 ? 'second-row' : '';
        const medal  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;

        const tags = m.results.map(g => {
            if (!g.data) return `<span class="tag cut-tag"><span class="tag-score">?</span> ${last(g.name)}</span>`;
            const cut = g.data.status !== 'active'
                ? ` <span class="grayed">(${g.data.status.toUpperCase()})</span>` : '';
            return `<span class="${g.data.status !== 'active' ? 'tag cut-tag' : 'tag'}"
                title="${g.name} · Pos: ${g.data.position} · Thru: ${g.data.thru || '--'}">
                <span class="tag-score ${cls(g.data.score)}">${g.data.scoreDisplay}</span>
                ${last(g.name)}${cut}
            </span>`;
        }).join('');

        html += `<tr class="${rowCls}">
            <td class="rank-cell">${medal}</td>
            <td><strong>${esc(m.name)}</strong> ${m.paid ? '<span title="Paid">✅</span>' : '<span title="Not paid" style="opacity:0.4">💸</span>'}</td>
            <td class="picks-cell">${tags}</td>
            <td class="total-score ${cls(m.total)} score-animate" data-score="${m.total}">${fmt(m.total)}</td>
            <td class="holes-left-cell">${holesLeftDisplay(m.holesLeft)}</td>
        </tr>`;
    });

    document.getElementById('poolStandings').innerHTML = html + '</tbody></table>';
    animateScores();
}

// ── Render leaderboard ───────────────────────────────────────
function renderLeaderboard() {
    const all = Object.values(golfersData);
    if (!all.length) return;

    // Build set of pool picks for highlighting
    const pickSet = new Set();
    POOL_MEMBERS.forEach(m => m.picks.forEach(p => {
        pickSet.add(p.toLowerCase());
        pickSet.add(p.split(' ').pop().toLowerCase());
    }));
    const isPoolPick = name =>
        pickSet.has(name.toLowerCase()) ||
        pickSet.has(name.split(' ').pop().toLowerCase());

    const active    = all.filter(g => g.status === 'active')
                         .sort((a, b) => a.score !== b.score ? a.score - b.score : a.sortOrder - b.sortOrder);
    const nonActive = all.filter(g => g.status !== 'active')
                         .sort((a, b) => a.score - b.score);

    // Build reverse map: golfer name → list of member names who picked them
    const pickerMap = {};
    POOL_MEMBERS.forEach(m => {
        m.picks.forEach(p => {
            const key = p.toLowerCase();
            if (!pickerMap[key]) pickerMap[key] = [];
            pickerMap[key].push(m.name);
        });
    });
    const pickersFor = name => {
        return pickerMap[name.toLowerCase()]
            || pickerMap[name.toLowerCase().split(' ').pop()]
            || [];
    };

    const row = g => {
        const pool    = isPoolPick(g.name);
        const pickers = pickersFor(g.name);
        const badge   = g.status !== 'active'
            ? ` <span class="grayed">(${g.status.toUpperCase()})</span>` : '';
        const pickersAttr = pickers.length
            ? `data-pickers="${esc(pickers.join(', '))}"` : 'data-pickers=""';
        return `<tr class="${pool ? 'pool-highlight' : ''}">
            <td class="lb-pos">${g.position}</td>
            <td class="lb-name ${pool ? 'pool-pick' : ''}" ${pickersAttr}>${esc(g.name)}${badge}</td>
            <td class="lb-score ${cls(g.score)}">${g.scoreDisplay}</td>
            <td class="lb-round">${g.rounds[1] ?? '--'}</td>
            <td class="lb-round">${g.rounds[2] ?? '--'}</td>
            <td class="lb-round r3">${g.rounds[3] ?? '--'}</td>
            <td class="lb-round r4">${g.rounds[4] ?? '--'}</td>
            <td class="lb-thru">${g.thru || '--'}</td>
        </tr>`;
    };

    let html = `<table><thead><tr>
        <th class="lb-pos">Pos</th>
        <th>Player</th>
        <th class="lb-score">Total</th>
        <th class="lb-round">R1</th>
        <th class="lb-round">R2</th>
        <th class="lb-round r3">R3</th>
        <th class="lb-round r4">R4</th>
        <th class="lb-thru">Thru</th>
    </tr></thead><tbody>`;

    // Projected cut line (shown during R1 & R2 only — after R2 cut is already made)
    const roundNum = parseInt((roundStatus.match(/\d+/) || ['0'])[0]);
    const showProjectedCut = roundNum <= 2 && nonActive.length === 0;
    const CUT_POSITION = 50;

    active.forEach((g, i) => {
        html += row(g);
        if (showProjectedCut && i === CUT_POSITION - 1 && i < active.length - 1) {
            html += `<tr class="cut-line-row"><td colspan="8">✂ Projected Cut Line</td></tr>`;
        }
    });
    if (nonActive.length) {
        html += `<tr class="cut-divider"><td colspan="8">— Missed Cut / Withdrawn —</td></tr>`;
        nonActive.forEach(g => { html += row(g); });
    }

    document.getElementById('leaderboard').innerHTML = html + '</tbody></table>';
}

function renderAll() { renderPool(); renderLeaderboard(); renderMatrix(); renderPopularity(); renderBubble(); }

// ── Who Picked Whom matrix ───────────────────────────────────
function renderMatrix() {
    const container = document.getElementById('picksMatrix');

    // All unique golfers picked, sorted A-Z
    const golferSet = new Set();
    POOL_MEMBERS.forEach(m => m.picks.forEach(p => golferSet.add(p)));
    const golfers = [...golferSet].sort((a, b) => a.localeCompare(b));

    const members  = POOL_MEMBERS.filter(m => m.picks.length > 0);
    const CELL     = 32;
    const LEFT_PAD = 188;   // room for golfer names
    const TOP_PAD  = 130;   // room for rotated member names
    const W = LEFT_PAD + members.length * CELL + 2;
    const H = TOP_PAD  + golfers.length  * CELL + 2;

    const dark   = document.body.classList.contains('dark');
    const BG_ALT = dark ? '#1a2118' : '#f7f4ee';
    const GRID   = dark ? '#2a3a2a' : '#ddd';
    const TXTCOL = dark ? '#c0d0c0' : '#2c2c2c';
    const BORDER = dark ? '#2a3a2a' : '#bbb';

    let svg = `<svg xmlns="http://www.w3.org/2000/svg"
        width="${W}" height="${H}"
        style="font-family:Georgia,serif;display:block;">`;

    // Alternating row backgrounds
    golfers.forEach((g, gi) => {
        const y = TOP_PAD + gi * CELL;
        if (gi % 2 === 0) {
            svg += `<rect x="0" y="${y}" width="${W}" height="${CELL}" fill="${BG_ALT}" />`;
        }
    });

    // Subtle column grid lines
    members.forEach((m, mi) => {
        const x = LEFT_PAD + mi * CELL;
        svg += `<line x1="${x}" y1="${TOP_PAD}" x2="${x}" y2="${H}"
            stroke="${GRID}" stroke-width="1"/>`;
    });

    // Golfer name labels (right-aligned, vertically centered in row)
    golfers.forEach((g, gi) => {
        const y = TOP_PAD + gi * CELL + CELL / 2;
        // Live score badge next to name
        const d = find(g);
        const score = d ? d.scoreDisplay : '';
        const scCol = d ? (d.score < 0 ? '#c0392b' : d.score > 0 ? '#555' : '#27ae60') : '#aaa';
        svg += `<text x="${LEFT_PAD - 10}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="13" fill="${TXTCOL}">
            ${esc(g)}${score ? `<tspan fill="${scCol}" font-weight="bold" font-size="11"> ${esc(score)}</tspan>` : ''}
        </text>`;
    });

    // Member name labels (rotated -45° above columns)
    members.forEach((m, mi) => {
        const x = LEFT_PAD + mi * CELL + CELL / 2;
        svg += `<text transform="translate(${x},${TOP_PAD - 8}) rotate(-45)"
            text-anchor="start" font-size="12.5" fill="${TXTCOL}">${esc(m.name)}</text>`;
    });

    // Filled squares — colored by golfer's current score
    golfers.forEach((g, gi) => {
        const y    = TOP_PAD + gi * CELL;
        const data = find(g);
        const fill = data ? heatColor(data.score) : '#ccc';
        members.forEach((m, mi) => {
            const picked = m.picks.some(p =>
                p.toLowerCase() === g.toLowerCase() ||
                p.toLowerCase().endsWith(g.toLowerCase().split(' ').pop())
            );
            if (picked) {
                const x = LEFT_PAD + mi * CELL;
                svg += `<rect x="${x + 3}" y="${y + 3}"
                    width="${CELL - 6}" height="${CELL - 6}"
                    rx="3" fill="${fill}" />`;
            }
        });
    });

    // Outer border lines
    svg += `<rect x="${LEFT_PAD}" y="${TOP_PAD}"
        width="${members.length * CELL}" height="${golfers.length * CELL}"
        fill="none" stroke="${BORDER}" stroke-width="1"/>`;

    // Horizontal row dividers
    golfers.forEach((_, gi) => {
        const y = TOP_PAD + gi * CELL;
        svg += `<line x1="${LEFT_PAD}" y1="${y}" x2="${W}" y2="${y}"
            stroke="${GRID}" stroke-width="1"/>`;
    });

    svg += '</svg>';

    const legendItems = [
        ['#0d4a28', '≤ -5'],
        ['#1a5c38', '-3, -4'],
        ['#52b788', '-1, -2'],
        ['#c9a84c', 'E'],
        ['#e07b39', '+1, +2'],
        ['#c0392b', '≥ +3'],
        ['#ccc',    'Not started'],
    ];

    const legend = `<div style="display:flex;flex-wrap:wrap;gap:12px;padding:10px 16px 14px;font-family:sans-serif;font-size:0.78em;color:#555;">
        <span style="font-weight:bold;color:#333;align-self:center;">Score:</span>
        ${legendItems.map(([color, label]) => `
            <span style="display:flex;align-items:center;gap:5px;">
                <span style="width:14px;height:14px;border-radius:3px;background:${color};display:inline-block;flex-shrink:0;"></span>
                ${label}
            </span>`).join('')}
    </div>`;

    container.innerHTML = svg + legend;
}

// ── Popularity chart ─────────────────────────────────────────
function renderPopularity() {
    const container = document.getElementById('popularityChart');
    const withPicks = POOL_MEMBERS.filter(m => m.picks.length);

    if (withPicks.length === 0) {
        container.innerHTML = '<div class="empty-state">No picks submitted yet.</div>';
        return;
    }

    // Count picks per golfer
    const counts = {};
    withPicks.forEach(m => m.picks.forEach(p => {
        counts[p] = (counts[p] || 0) + 1;
    }));

    const total   = withPicks.length;
    const entries = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const maxCount = entries[0][1];

    const rows = entries.map(([name, count]) => {
        const d       = find(name);
        const pct     = (count / maxCount) * 100;
        const barCol  = d ? heatColor(d.score) : '#1a5c38';
        const score   = d ? `<span class="${cls(d.score)}" style="font-weight:bold">${d.scoreDisplay}</span>` : '';
        const label   = count === 1 ? '1 member' : `${count} members`;
        return `<div class="pop-row">
            <div class="pop-name">${esc(name)}</div>
            <div class="pop-bar-wrap">
                <div class="pop-bar" style="width:${pct}%;background:${barCol}">
                    <span class="pop-count">${label}</span>
                </div>
            </div>
            <div class="pop-score">${score}</div>
        </div>`;
    }).join('');

    container.innerHTML = `
        <div style="font-size:0.78em;color:#888;font-family:sans-serif;margin-bottom:14px;">
            Based on ${total} of ${POOL_MEMBERS.length} submitted picks · bar color = current score
        </div>
        ${rows}
        <div style="display:flex;gap:16px;margin-top:16px;font-size:0.75em;font-family:sans-serif;color:#666;flex-wrap:wrap;">
            ${[[-5,'≤-5'],[-3,'-3,-4'],[-1,'-1,-2'],[0,'E'],[1,'+1,+2'],[3,'≥+3']].map(([s,l]) =>
                `<span style="display:flex;align-items:center;gap:5px;">
                    <span style="width:14px;height:14px;border-radius:3px;background:${heatColor(s)};display:inline-block"></span>${l}
                </span>`
            ).join('')}
        </div>`;
}

// ── Bubble chart ──────────────────────────────────────────────
function renderBubble() {
    const container = document.getElementById('bubbleChart');

    // Include ALL members — no picks = gray bubble at 0
    const members = POOL_MEMBERS.map(m => {
        const hasPicks = m.picks.length > 0;
        const results  = m.picks.map(p => find(p)).filter(Boolean);
        const total    = results.reduce((s, g) => s + g.score, 0);
        const holesLeft = hasPicks
            ? results.reduce((s, g) => s + holesRemaining(g), 0)
            : null; // null = no picks yet
        return { name: m.name, total, holesLeft, hasPicks };
    });

    members.sort((a, b) => a.total - b.total);

    const PAD_L = 30, PAD_R = 30, PAD_T = 60, PAD_B = 40;
    const W = Math.max(700, members.length * 52);
    const H = 300;
    const PLOT_W = W - PAD_L - PAD_R;
    const PLOT_H = H - PAD_T - PAD_B;

    const scores   = members.map(m => m.total);
    const minScore = Math.min(...scores) - 1;
    const maxScore = Math.max(...scores) + 1;
    const range    = maxScore - minScore || 1;

    const pickedHoles  = members.filter(m => m.hasPicks).map(m => m.holesLeft);
    const maxHolesLeft = Math.max(...pickedHoles, 1);

    const xPos  = s  => PAD_L + ((s - minScore) / range) * PLOT_W;
    const rSize = m  => m.hasPicks ? 14 + (m.holesLeft / maxHolesLeft) * 18 : 8;

    // Spread bubbles vertically — alternate above/below axis to reduce overlap
    const yPositions = members.map((_, i) => {
        const mid    = PAD_T + PLOT_H * 0.5;
        const spread = PLOT_H * 0.38;
        return mid + (i % 2 === 0 ? -spread : spread) * (0.4 + 0.6 * (i / members.length));
    });

    const dark     = document.body.classList.contains('dark');
    const axisCol  = dark ? '#2a3a2a' : '#ccc';
    const tickCol  = dark ? '#3a4a3a' : '#bbb';
    const labelCol = dark ? '#778877' : '#666';
    const nameCol  = dark ? '#c0d0c0' : '#2c2c2c';

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" style="font-family:Georgia,serif;display:block;min-width:${W}px">`;

    // X axis line
    const axisY = H - PAD_B;
    svg += `<line x1="${PAD_L}" y1="${axisY}" x2="${W - PAD_R}" y2="${axisY}" stroke="${axisCol}" stroke-width="1"/>`;

    // Score tick marks on X axis
    for (let s = Math.ceil(minScore); s <= Math.floor(maxScore); s++) {
        const x = xPos(s);
        const label = s === 0 ? 'E' : s > 0 ? `+${s}` : String(s);
        const col   = s < 0 ? '#c0392b' : s > 0 ? (dark ? '#778877' : '#888') : '#27ae60';
        svg += `<line x1="${x}" y1="${axisY - 3}" x2="${x}" y2="${axisY + 3}" stroke="${tickCol}" stroke-width="1"/>`;
        svg += `<text x="${x}" y="${axisY + 15}" text-anchor="middle" font-size="11" fill="${col}">${label}</text>`;
    }

    // Bubbles
    members.forEach((m, i) => {
        const x   = xPos(m.total);
        const y   = yPositions[i];
        const r   = rSize(m);
        const col = m.hasPicks ? heatColor(m.total) : (dark ? '#2a3a2a' : '#ccc');
        const lineY2 = y < axisY ? y + r : y - r;

        // Dashed line to axis
        svg += `<line x1="${x}" y1="${lineY2}" x2="${x}" y2="${axisY}" stroke="${col}" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>`;

        // Bubble
        svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity="${m.hasPicks ? 0.9 : 0.5}"/>`;

        // Label inside bubble (only if has picks)
        if (m.hasPicks) {
            svg += `<text x="${x}" y="${y + 4}" text-anchor="middle" font-size="11" fill="white" font-weight="bold">${esc(fmt(m.total))}</text>`;
        }

        // Name — above or below depending on y position
        const nameY = y < axisY ? y - r - 5 : y + r + 13;
        const nameSize = m.hasPicks ? 12 : 10;
        const nameOpacity = m.hasPicks ? 1 : 0.5;
        svg += `<text x="${x}" y="${nameY}" text-anchor="middle" font-size="${nameSize}" fill="${nameCol}" opacity="${nameOpacity}">${esc(m.name)}</text>`;
    });

    // Legend note
    svg += `<text x="${PAD_L}" y="14" font-size="11" fill="#aaa" font-family="sans-serif">Bubble size = holes remaining · color = score</text>`;

    svg += '</svg>';
    container.innerHTML = svg;
}

// ── Holes remaining ──────────────────────────────────────────
function holesRemaining(data) {
    if (!data || data.status !== 'active') return 0;
    const thru          = parseInt(data.thru) || 0;
    const roundsWithScore = Object.keys(data.rounds).length;
    // If thru > 0, one round is in progress — don't double-count it
    const holesPlayed = thru > 0
        ? (roundsWithScore - 1) * 18 + thru
        : roundsWithScore * 18;
    return Math.max(0, 72 - holesPlayed);
}

function holesLeftDisplay(n) {
    if (n === 0)   return `<span class="hl-done">Done</span>`;
    if (n >= 260)  return `<span class="hl-many">${n}</span>`;
    if (n >= 150)  return `<span class="hl-mid">${n}</span>`;
    return `<span class="hl-few">${n}</span>`;
}

// ── Score → heat color ────────────────────────────────────────
function heatColor(score) {
    if (score <= -5) return '#0d4a28';
    if (score <= -3) return '#1a5c38';
    if (score <= -1) return '#52b788';
    if (score === 0) return '#c9a84c';
    if (score <= 2)  return '#e07b39';
    return '#c0392b';
}

// ── Helpers ──────────────────────────────────────────────────
function find(name) {
    if (golfersData[name]) return golfersData[name];
    const low = name.toLowerCase();
    return Object.values(golfersData).find(g =>
        g.name.toLowerCase() === low ||
        g.name.toLowerCase().endsWith(low.split(' ').pop())
    ) || null;
}

function parseScore(s) {
    if (!s || s === 'E' || s === '--') return 0;
    const n = parseInt(s.replace('+', ''), 10);
    return isNaN(n) ? 0 : n;
}

function fmt(n) { return n === 0 ? 'E' : n > 0 ? `+${n}` : String(n); }
function cls(n) { return n < 0 ? 'under' : n > 0 ? 'over' : 'even'; }
function last(s) { const p = s.trim().split(' '); return p[p.length - 1]; }
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(t) { document.getElementById('statusText').textContent = t; }
function setDot(s) {
    const d = document.getElementById('dot');
    d.className = 'dot';
    if (s === 'refreshing') d.classList.add('refreshing');
    if (s === 'error')      d.classList.add('error');
}

// ── Picker tooltip ───────────────────────────────────────────
const tooltip = document.getElementById('pickerTooltip');

document.getElementById('leaderboard').addEventListener('mouseover', e => {
    const cell = e.target.closest('[data-pickers]');
    if (!cell) return;
    const pickers = cell.dataset.pickers ? cell.dataset.pickers.split(', ') : [];
    const name    = cell.textContent.replace(/\(.*?\)/g, '').trim();
    if (pickers.length) {
        const tags = pickers.map(p => `<span class="tt-name">${esc(p)}</span>`).join('');
        tooltip.innerHTML = `<div class="tt-title">Picked by · ${pickers.length}</div><div class="tt-names">${tags}</div>`;
    } else {
        tooltip.innerHTML = `<div class="tt-title">${esc(name)}</div><span class="tt-none">Not picked by anyone</span>`;
    }
    tooltip.style.display = 'block';
});

document.getElementById('leaderboard').addEventListener('mousemove', e => {
    const pad = 14;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    // Keep tooltip inside viewport
    if (x + tooltip.offsetWidth > window.innerWidth - 8)  x = e.clientX - tooltip.offsetWidth - pad;
    if (y + tooltip.offsetHeight > window.innerHeight - 8) y = e.clientY - tooltip.offsetHeight - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
});

document.getElementById('leaderboard').addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
});

// ── Dark mode ────────────────────────────────────────────────
function toggleDark() {
    document.body.classList.toggle('dark');
    localStorage.setItem('masters_dark', document.body.classList.contains('dark') ? '1' : '0');
    updateDarkBtn();
    // Re-render SVG-based charts so they pick up new colors
    renderMatrix();
    renderBubble();
}

function updateDarkBtn() {
    const btn = document.getElementById('darkToggle');
    btn.textContent = document.body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';
}

function initDarkMode() {
    if (localStorage.getItem('masters_dark') === '1') {
        document.body.classList.add('dark');
    }
    updateDarkBtn();
}

// ── Score ticker ──────────────────────────────────────────────
let firstLoad = true;

function animateScores() {
    if (!firstLoad) return;
    firstLoad = false;
    document.querySelectorAll('.total-score[data-score]').forEach(el => {
        const target   = parseInt(el.dataset.score) || 0;
        if (target === 0) return; // E — nothing to count
        const duration = 700;
        const start    = Date.now();
        function tick() {
            const p       = Math.min((Date.now() - start) / duration, 1);
            const eased   = 1 - Math.pow(1 - p, 3);
            const current = Math.round(target * eased);
            el.textContent = fmt(current);
            if (p < 1) requestAnimationFrame(tick);
            else el.textContent = fmt(target);
        }
        requestAnimationFrame(tick);
    });
}

// ── Boot ─────────────────────────────────────────────────────
initDarkMode();
fetchScores();
setInterval(fetchScores, REFRESH_MS);
</script>
